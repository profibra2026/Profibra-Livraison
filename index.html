<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROFIBRA - Suivi Livraisons</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f5;color:#1a1a1a}
.topbar{background:#1a1a1a;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:62px;position:sticky;top:0;z-index:50}
.tlogo{height:46px;object-fit:contain;filter:invert(1)}
.tright{display:flex;align-items:center;gap:14px}
.nbtn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);color:#fff;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px}
.nbadge{background:#ef4444;color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:600}
.clk{font-size:12px;color:rgba(255,255,255,0.55)}
.nav{background:#fff;border-bottom:1px solid #e5e7eb;display:flex;padding:0 20px;gap:2px;position:sticky;top:62px;z-index:40}
.nb{background:none;border:none;border-bottom:3px solid transparent;padding:14px 18px;font-size:13px;color:#6b7280;cursor:pointer;white-space:nowrap}
.nb.active{color:#1a1a1a;border-bottom-color:#e8a020;font-weight:600}
.nb:hover{color:#1a1a1a;background:#f9fafb}
.content{padding:24px}
.pg{display:none}.pg.on{display:block}
.kgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.kpi{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px}
.kl{font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kv{font-size:28px;font-weight:600;color:#1a1a1a}
.ks{font-size:11px;color:#9ca3af;margin-top:3px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;margin-bottom:16px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.ct{font-size:14px;font-weight:600;color:#1a1a1a}
.btn{background:#f3f4f6;border:1px solid #d1d5db;border-radius:8px;padding:8px 14px;font-size:13px;color:#1a1a1a;cursor:pointer}
.btn:hover{background:#e5e7eb}
.btn.p{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn.d{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.btn.s{padding:5px 10px;font-size:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;color:#6b7280;font-weight:600;font-size:12px;border-bottom:1px solid #e5e7eb;white-space:nowrap;background:#f9fafb}
td{padding:10px 12px;border-bottom:1px solid #f3f4f6;color:#1a1a1a;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f9fafb}
.bg{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.bp{background:#dbeafe;color:#1d4ed8}.be{background:#fef3c7;color:#92400e}
.bf{background:#dcfce7;color:#166534}.br{background:#fee2e2;color:#991b1b}.ba{background:#f3f4f6;color:#374151}
.sbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.sbar input,.sbar select{font-size:13px;padding:8px 12px;border-radius:8px;border:1px solid #d1d5db;background:#fff;color:#1a1a1a}
.sbar input{flex:1;min-width:160px}
.mwrap{display:none;background:rgba(0,0,0,0.55);padding:32px 16px;border-radius:12px;margin-bottom:16px}
.mwrap.on{display:block}
.mbox{background:#fff;border-radius:14px;border:1px solid #e5e7eb;max-width:600px;margin:0 auto}
.mhd{padding:18px 22px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e5e7eb}
.mhd h3{font-size:15px;font-weight:600;color:#1a1a1a}
.mcl{background:none;border:none;font-size:22px;cursor:pointer;color:#9ca3af;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px}
.mbd{padding:20px 22px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ff{display:flex;flex-direction:column;gap:5px}
.ff.full{grid-column:1/-1}
.ff label{font-size:12px;color:#6b7280;font-weight:600}
.ff input,.ff select,.ff textarea{font-size:13px;padding:8px 10px;border-radius:8px;border:1px solid #d1d5db;background:#fff;color:#1a1a1a;width:100%}
.ff textarea{resize:vertical;min-height:68px}
.mft{padding:14px 22px 18px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid #e5e7eb}
.alist{display:flex;flex-direction:column;gap:10px}
.ai{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:10px;border:1px solid}
.ai.w{background:#fffbeb;border-color:#fcd34d}
.ai.r{background:#fee2e2;border-color:#fca5a5}
.ai.i{background:#eff6ff;border-color:#93c5fd}
.aico{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.ai.w .aico{background:#f59e0b}.ai.r .aico{background:#ef4444}.ai.i .aico{background:#3b82f6}
.att{font-size:13px;font-weight:600;color:#1a1a1a}
.ats{font-size:12px;color:#6b7280;margin-top:2px}
.dgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.dc{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:18px}
.dav{width:48px;height:48px;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:#fff;margin-bottom:12px}
.dn{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:5px}
.di{font-size:12px;color:#6b7280;margin-bottom:3px}
.db{display:inline-block;margin-top:10px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
.dbok{background:#dcfce7;color:#166534}.dbn{background:#fef3c7;color:#92400e}.dbc{background:#f3f4f6;color:#374151}
.pb{height:7px;background:#f3f4f6;border-radius:4px;overflow:hidden;margin-top:5px}
.pf{height:100%;border-radius:4px}
.empty{text-align:center;padding:40px;color:#9ca3af;font-size:13px}
</style>
</head>

var LABEL = {Planifie:"Planifie",  "En cours":"En cours", Fait:"Fait", Retarde:"Retarde", Annule:"Annule"};
var BADGE = {Planifie:"bp", "En cours":"be", Fait:"bf", Retarde:"br", Annule:"ba"};
var COLOR = {Planifie:"#3b82f6", "En cours":"#f59e0b", Fait:"#22c55e", Retarde:"#ef4444", Annule:"#9ca3af"};

function bc(s) { return "bg " + (BADGE[s] || "bp"); }
function ini(n) { return n.split(" ").map(function(w){return w[0]||"";}).slice(0,2).join("").toUpperCase(); }
function fd(d) { return d ? d.split("-").reverse().join("/") : "-"; }
function gv(id) { return document.getElementById(id).value.trim(); }
function el(id) { return document.getElementById(id); }

function go(p) {
  ["db","liv","drvs","alertes"].forEach(function(x) {
    el("pg-"+x).classList.remove("on");
    el("nav-"+x).classList.remove("active");
  });
  el("pg-"+p).classList.add("on");
  el("nav-"+p).classList.add("active");
  if(p==="db") rDB();
  if(p==="liv") { fillF(); rTable(); }
  if(p==="drvs") rDrvs();
  if(p==="alertes") rAlerts();
}

function rDB() {
  var c = {Planifie:0,"En cours":0,Fait:0,Retarde:0,Annule:0};
  D.livraisons.forEach(function(l){ if(c[l.st]!==undefined) c[l.st]++; });
  var tot = D.livraisons.length;
  el("kgrid").innerHTML = [
    {l:"Total livraisons",v:tot,s:"Toutes dates"},
    {l:"Planifiees",v:c.Planifie,s:"A effectuer"},
    {l:"En cours",v:c["En cours"],s:"En deplacement"},
    {l:"Faites",v:c.Fait,s:"Terminees"},
    {l:"Retardees",v:c.Retarde,s:"A surveiller"}
  ].map(function(k){ return "<div class='kpi'><div class='kl'>"+k.l+"</div><div class='kv'>"+k.v+"</div><div class='ks'>"+k.s+"</div></div>"; }).join("");

  var today = new Date().toISOString().split("T")[0];
  var tl = D.livraisons.filter(function(l){ return l.date===today; });
  el("tday").innerHTML = tl.length===0
    ? "<div class='empty'>Aucune livraison planifiee aujourd'hui</div>"
    : tl.map(function(l){
        return "<div style='display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f3f4f6'>"
          +"<div><div style='font-size:13px;font-weight:600'>"+l.num+" - "+l.vi+"</div>"
          +"<div style='font-size:12px;color:#9ca3af;margin-top:2px'>"+l.ch+" - "+(l.dep||"-")+"</div></div>"
          +"<span class='"+bc(l.st)+"'>"+l.st+"</span></div>";
      }).join("");

  el("sbars").innerHTML = ["Planifie","En cours","Fait","Retarde","Annule"].map(function(s){
    var pct = tot ? Math.round(c[s]/tot*100) : 0;
    return "<div style='margin-bottom:14px'>"
      +"<div style='display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px'>"
      +"<span style='color:#9ca3af'>"+s+"</span><span style='font-weight:600'>"+c[s]+"</span></div>"
      +"<div class='pb'><div class='pf' style='width:"+pct+"%;background:"+(COLOR[s]||"#888")+"'></div></div></div>";
  }).join("");
}

function fillF() {
  var drivers = [];
  D.livraisons.forEach(function(l){ if(drivers.indexOf(l.ch)===-1) drivers.push(l.ch); });
  drivers.sort();
  el("fdr2").innerHTML = "<option value=''>Tous les chauffeurs</option>"
    + drivers.map(function(d){ return "<option>"+d+"</option>"; }).join("");
}

function rTable() {
  var srch = el("srch").value.toLowerCase();
  var st = el("fst2").value;
  var dr = el("fdr2").value;
  var rows = D.livraisons.filter(function(l){
    if(st && l.st!==st) return false;
    if(dr && l.ch!==dr) return false;
    if(srch && JSON.stringify(l).toLowerCase().indexOf(srch)===-1) return false;
    return true;
  });
  var tb = el("ltbody");
  if(!rows.length) { tb.innerHTML="<tr><td colspan='15' style='text-align:center;padding:32px;color:#9ca3af'>Aucune livraison trouvee</td></tr>"; return; }
  tb.innerHTML = rows.map(function(l){
    return "<tr>"
      +"<td style='font-weight:600;white-space:nowrap'>"+l.num+"</td>"
      +"<td style='white-space:nowrap'>"+fd(l.date)+"</td>"
      +"<td style='white-space:nowrap'>"+fd(l.dR)+"</td>"
      +"<td>"+(l.dep||"-")+"</td><td>"+(l.arr||"-")+"</td>"
      +"<td style='white-space:nowrap'>"+l.ch+"</td>"
      +"<td style='white-space:nowrap;color:#6b7280;font-size:12px'>"+l.veh+"</td>"
      +"<td style='white-space:nowrap;color:#6b7280;font-size:12px'>"+l.bc+"</td>"
      +"<td>"+l.cl+"</td><td>"+l.vi+"</td>"
      +"<td style='color:#6b7280;font-size:12px'>"+l.rg+"</td>"
      +"<td style='max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'>"+l.mi+"</td>"
      +"<td><span class='"+bc(l.st)+"'>"+l.st+"</span></td>"
      +"<td style='max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#6b7280;font-size:12px'>"+(l.ob||"-")+"</td>"
      +"<td style='white-space:nowrap'>"
      +"<button class='btn s' data-id='"+l.id+"' data-action='edit'>Modifier</button> "
      +"<button class='btn s d' data-id='"+l.id+"' data-action='del'>Suppr.</button>"
      +"</td></tr>";
  }).join("");

  tb.querySelectorAll("button[data-action='edit']").forEach(function(b){
    b.addEventListener("click", function(){ openLiv(parseInt(this.getAttribute("data-id"))); });
  });
  tb.querySelectorAll("button[data-action='del']").forEach(function(b){
    b.addEventListener("click", function(){ delL(parseInt(this.getAttribute("data-id"))); });
  });
}

function openLiv(id) {
  eid = id || null;
  el("fch").innerHTML = D.chauffeurs.map(function(c){ return "<option>"+c.nom+"</option>"; }).join("");
  if(eid) {
    var l = null;
    D.livraisons.forEach(function(x){ if(x.id===eid) l=x; });
    el("mtitle").textContent = "Modifier la livraison";
    el("fn").value=l.num; el("fd").value=l.date; el("fdr").value=l.dR||"";
    el("fdep").value=l.dep||""; el("farr").value=l.arr||"";
    el("fch").value=l.ch; el("fv").value=l.veh; el("fbc").value=l.bc;
    el("fcl").value=l.cl; el("fvi").value=l.vi; el("frg").value=l.rg;
    el("fm").value=l.mi; el("fst").value=l.st; el("fob").value=l.ob;
  } else {
    el("mtitle").textContent = "Nouvelle livraison";
    ["fn","fd","fdr","fdep","farr","fv","fbc","fcl","fvi","frg","fm","fob"].forEach(function(i){ el(i).value=""; });
    el("fst").value = "Planifie";
    el("fn").value = "LIV-00" + D.nx;
  }
  el("mliv").classList.add("on");
  el("mliv").scrollIntoView({behavior:"smooth",block:"start"});
}

function closeLiv() { el("mliv").classList.remove("on"); }

function saveLiv() {
  var obj = {
    num:gv("fn"),date:gv("fd"),dR:gv("fdr"),dep:gv("fdep"),arr:gv("farr"),
    ch:gv("fch"),veh:gv("fv"),bc:gv("fbc"),cl:gv("fcl"),vi:gv("fvi"),
    rg:gv("frg"),mi:gv("fm"),st:el("fst").value,ob:gv("fob")
  };
  if(!obj.num||!obj.date||!obj.ch) { alert("Champs obligatoires (*) manquants."); return; }
  if(eid) {
    for(var i=0;i<D.livraisons.length;i++){
      if(D.livraisons[i].id===eid){ D.livraisons[i]=Object.assign({},D.livraisons[i],obj); break; }
    }
  } else {
    obj.id = D.nx++;
    D.livraisons.push(obj);
  }
  sv(D); closeLiv(); fillF(); rTable(); rDB(); notif();
}

function delL(id) {
  if(!confirm("Supprimer cette livraison ?")) return;
  D.livraisons = D.livraisons.filter(function(l){ return l.id!==id; });
  sv(D); rTable(); rDB(); notif();
}

function rDrvs() {
  el("dgrid").innerHTML = D.chauffeurs.map(function(c){
    var cl = c.dis==="Disponible"?"dbok":c.dis==="Conge"?"dbc":"dbn";
    return "<div class='dc'><div class='dav'>"+ini(c.nom)+"</div>"
      +"<div class='dn'>"+c.nom+"</div><div class='di'>"+c.veh+"</div>"
      +"<div class='di'>"+c.tel+"</div><div class='di'>"+c.cin+"</div>"
      +"<span class='db "+cl+"'>"+c.dis+"</span></div>";
  }).join("");
}

function openDrv() {
  ["dnom","dcin","dtel","dveh"].forEach(function(i){ el(i).value=""; });
  el("ddis").value="Disponible";
  el("mdrv").classList.add("on");
  el("mdrv").scrollIntoView({behavior:"smooth",block:"start"});
}

function closeDrv() { el("mdrv").classList.remove("on"); }

function saveDrv() {
  var nom = gv("dnom");
  if(!nom) { alert("Nom obligatoire."); return; }
  D.chauffeurs.push({id:D.nx++,nom:nom,cin:gv("dcin"),tel:gv("dtel"),veh:gv("dveh"),dis:el("ddis").value});
  sv(D); closeDrv(); rDrvs();
}

function getAlerts() {
  var today = new Date().toISOString().split("T")[0];
  var a = [];
  D.livraisons.forEach(function(l){
    if(l.st==="Retarde") a.push({t:"r",i:"!",ti:"Retardee : "+l.num,s:l.cl+" - "+l.vi+" - "+l.ch});
    if(l.st==="En cours") a.push({t:"i",i:"i",ti:"En cours : "+l.num,s:l.cl+" - "+l.vi+" - Depart "+(l.dep||"-")});
    if(l.st==="Planifie"&&l.date===today) a.push({t:"w",i:"~",ti:"Planifiee aujourd'hui : "+l.num,s:l.cl+" - "+l.vi+" - "+l.ch});
  });
  return a;
}

function notif() { el("nc").textContent = getAlerts().length; }

function rAlerts() {
  var a = getAlerts();
  el("alist").innerHTML = a.length===0
    ? "<div class='empty'>Aucune alerte active</div>"
    : a.map(function(x){
        return "<div class='ai "+x.t+"'><div class='aico'>"+x.i+"</div>"
          +"<div><div class='att'>"+x.ti+"</div><div class='ats'>"+x.s+"</div></div></div>";
      }).join("");
}

function clock() {
  var n = new Date();
  var days = ["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
  var months = ["Jan","Fev","Mar","Avr","Mai","Jun","Jul","Aou","Sep","Oct","Nov","Dec"];
  var d = days[n.getDay()];
  var m = months[n.getMonth()];
  var h = n.getHours().toString().padStart(2,"0");
  var min = n.getMinutes().toString().padStart(2,"0");
  el("clk").textContent = d+" "+n.getDate()+" "+m+" - "+h+":"+min;
}

el("nav-db").addEventListener("click", function(){ go("db"); });
el("nav-liv").addEventListener("click", function(){ go("liv"); });
el("nav-drvs").addEventListener("click", function(){ go("drvs"); });
el("nav-alertes").addEventListener("click", function(){ go("alertes"); });
el("btnAlertes").addEventListener("click", function(){ go("alertes"); });
el("btnNewLiv").addEventListener("click", function(){ openLiv(null); });
el("btnCloseLiv").addEventListener("click", closeLiv);
el("btnCancelLiv").addEventListener("click", closeLiv);
el("btnSaveLiv").addEventListener("click", saveLiv);
el("btnNewDrv").addEventListener("click", openDrv);
el("btnCloseDrv").addEventListener("click", closeDrv);
el("btnCancelDrv").addEventListener("click", closeDrv);
el("btnSaveDrv").addEventListener("click", saveDrv);
el("srch").addEventListener("input", rTable);
el("fst2").addEventListener("change", rTable);
el("fdr2").addEventListener("change", rTable);

clock();
setInterval(clock, 30000);
go("db");

})();
</script>
</body>
</html>
